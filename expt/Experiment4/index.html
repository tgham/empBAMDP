<!DOCTYPE html>
<html>
    <head>
        <title>Button room experiment</title>
        <!-- jspsych -->
        <script src="jspsych/jspsych.js"></script>
        <script src="jspsych/plugin-html-keyboard-response.js"></script>
        <script src="jspsych/plugin-html-button-response.js"></script>
        <script src="jspsych/plugin-preload.js"></script>
        <script src="jspsych/plugin-fullscreen.js"></script>
        <script src="jspsych/plugin-instructions.js"></script>
        <script src="jspsych/plugin-survey-multi-choice.js"></script>
        <!-- my code -->
        <script src="js/config.js"></script>
        <script src="js/render.js"></script>
        <script src="js/trials.js"></script>
        <script src="js/instructions.js"></script>
        <script src="js/comprehension.js"></script>
        <script src="backend_integration.js" ></script>
        <!-- css -->
        <link href="jspsych/jspsych.css" rel="stylesheet" type="text/css" />
        <link href="css/style.css" rel="stylesheet" />
    </head>
    <body></body>
    <script>
        //------------------------------------//
        // Session identifiers + data saving
        //------------------------------------//
        // Prolific-style params if present in the URL, else a random id.
        var urlParams = new URLSearchParams(window.location.search);
        var subject_id = urlParams.get("PROLIFIC_PID") || ("anon_" + Date.now());
        var study_id = urlParams.get("STUDY_ID") || "";
        var session_id = urlParams.get("SESSION_ID") || "";

        // comprehension gate bookkeeping (read by the loops/conditionals below)
        var review_instructions = false;
        var quiz_passed = false;
        var quiz_attempts = 0;

        var jsPsych = initJsPsych({
            on_finish: function () {
                // download the full trial-by-trial data as CSV
                // jsPsych.data.get().localSave("csv", "exp4_" + subject_id + ".csv");

                var ppt_data = jsPsych.data.get().json();
                send_complete(id, ppt_data);

                // redirect to Prolific (links are set in config.js; blank = no redirect)
                var link = quiz_passed ? REDIRECT_COMPLETE : REDIRECT_FAIL;
                if (link) {
                    setTimeout(function () { window.location.replace(link); }, 500);
                }
            }
        });

        // attach session-level fields to every trial's data row
        jsPsych.data.addProperties({
            subject_id: subject_id,
            study_id: study_id,
            session_id: session_id,
            belief_display: BELIEF_DISPLAY,
            alpha: ALPHA
        });

        var timeline = [];

        //------------------------------------//
        // Preload images
        //------------------------------------//
        var preload = {
            type: jsPsychPreload,
            images: ["img/BaseAction_4k.png", "img/Agent.png", "img/Goal.png", "img/Check.png"]
        };
        timeline.push(preload);

        
        // get prolific id
        var pid = get_prolific_id();
        let id = null;
        create_participant(pid).then((value) => {
        // If the id is null, then the backend is complaining that the ppt has
        // done the experiment before
        // You should probably bail out in that case
        if (value['id'] == null) {
            console.log(`${pid} is not unique`);
        }
        // Otherwise, give the ppt an internal id
        id = value['id'];
        console.log(`id => ${id}`);
        })

        const informedConsentForm = `
            <div style="max-width: 800px; margin: auto; padding: 20px; font-family: Arial, sans-serif; line-height: 1.6; text-align: left;">
                <h2 style="text-align: center; color: rgb(255, 255, 255);">Participation in the Learning and Cognitive Control Study</h2>
                <p>This is a psychology experiment conducted by Dr. Peter Dayan, director of the Max Planck Institute for Biological Cybernetics, and the members of his lab.</p>
                <p>All data collected will be anonymous. We will not ask for any additional personally identifying information and will handle responses as confidentially as possible. However, we cannot guarantee the confidentiality of information transmitted over the Internet. We will keep de-identified data collected as part of this experiment indefinitely, and such data may be used as part of future studies and/or made available to the wider research community for follow-up analyses. Data used in scientific publications will remain completely anonymous.</p>
                <p>Your participation in this research is voluntary. You may refrain from answering any questions that make you uncomfortable and may withdraw your participation at any time without penalty by exiting this task. You may choose not to complete certain parts of the task or answer certain questions.</p>
                <p>Other than monetary compensation, participating in this study will provide no direct benefits to you. However, we hope that this research will benefit society at large by contributing towards establishing a scientific foundation for improving people’s learning and cognitive control abilities.</p>
                <p>By selecting the “consent” button below, you consent to taking part in this study.</p>
                <div style="text-align: center; margin-top: 20px;">
                    <button id="consent-given" style="background-color: #2C3E50; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-right: 10px;">I consent to participate</button>
                </div>
            </div>

        `;

        const informedConsentTrial = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: informedConsentForm,
            response_ends_trial: false,
            on_load: function() { 
                document.body.style.overflowY = "auto";
                document.documentElement.style.overflowY = "auto";
                document.getElementById('consent-given').addEventListener('click', function() {
                    jsPsych.finishTrial();
                });
            }
        };
        timeline.push(informedConsentTrial);


        //------------------------------------//
        // Fullscreen (the enlarged display needs the width)
        //------------------------------------//
        timeline.push({
            type: jsPsychFullscreen,
            fullscreen_mode: true,
            message: `<p>The task runs in fullscreen. Click below to continue.</p>`
        });

        //------------------------------------//
        // Instructions + comprehension gate.
        // Inner: instructions (with their own "review again" loop) -> quiz -> result.
        // Outer loop repeats this whole block while the participant hasn't passed
        // and hasn't used up both attempts. After it ends they've either passed or
        // failed twice.
        //------------------------------------//
        var instructions_block = {
            timeline: make_instructions_timeline(),
            loop_function: function () { return review_instructions; }
        };
        timeline.push({
            timeline: [instructions_block, make_comprehension_quiz(), make_quiz_result_trial()],
            loop_function: function () {
                return !quiz_passed && quiz_attempts < QUIZ_MAX_ATTEMPTS;
            }
        });

        //------------------------------------//
        // The experiment itself: only runs if the comprehension check was passed.
        // R rooms; each = intro (reset beliefs + draw fresh transitions) ->
        // N_TRIALS sampling trials -> a gold-collection trial.
        //------------------------------------//
        var experiment_timeline = [];
        for (let r = 1; r <= N_ROOMS; r++) {
            experiment_timeline.push(make_room_intro(r));
            for (let t = 1; t <= N_TRIALS; t++) {
                // each sampling trial is skipped once sampling has been ended early
                experiment_timeline.push({
                    timeline: [make_trial(r, t)],
                    conditional_function: function () { return !sampling_ended; }
                });
            }
            experiment_timeline.push(make_gold_trial(r));
        }
        experiment_timeline.push({
            type: jsPsychHtmlKeyboardResponse,
            stimulus: function () {
                var msg = SHOW_GOLD_OUTCOME
                    ? `<h3>You collected ${collected_gold} gold across ${N_ROOMS} rooms.</h3>`
                    : ``;
                return `<div style="text-align:center"><h2>Done!</h2>${msg}</div>`;
            },
            choices: "NO_KEYS",
            trial_duration: 2500
        });
        timeline.push({
            timeline: experiment_timeline,
            conditional_function: function () { return quiz_passed; }
        });

        //------------------------------------//
        // Failed the check twice: end here (the global on_finish handles redirect).
        //------------------------------------//
        timeline.push({
            timeline: [{
                type: jsPsychHtmlButtonResponse,
                choices: ["Finish"],
                stimulus: `<h2>Thank you for your time</h2>
                           <p style="max-width:640px; margin:14px auto;">The experiment has ended. Click below to
                           return to Prolific.</p>`,
                data: { task: "failed_end" }
            }],
            conditional_function: function () { return !quiz_passed; }
        });

        jsPsych.run(timeline);
    </script>
</html>
